name: Fetch Steam Data

on:
  schedule:
    - cron: '0 6 * * *'   # 매일 오전 6시 (UTC) 자동 실행
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch SteamSpy Data
        run: |
          mkdir -p data/tags

          echo "Fetching top 100 games (2 weeks)..."
          curl -s --max-time 30 \
            "https://steamspy.com/api.php?request=top100in2weeks" \
            -o data/hot.json || echo '{}' > data/hot.json

          echo "Fetching top 100 games (forever)..."
          curl -s --max-time 30 \
            "https://steamspy.com/api.php?request=top100forever" \
            -o data/top100.json || echo '{}' > data/top100.json

          # Fetch tag data for each genre
          declare -A TAGS=(
            ["FPS"]="FPS"
            ["RPG"]="RPG"
            ["Action"]="Action"
            ["Adventure"]="Adventure"
            ["Strategy"]="Strategy"
            ["Simulation"]="Simulation"
            ["Horror"]="Horror"
            ["Survival"]="Survival"
            ["Fighting"]="Fighting"
            ["Sports"]="Sports"
            ["Open_World"]="Open+World"
            ["Indie"]="Indie"
            ["Racing"]="Racing"
            ["Roguelike"]="Roguelike"
            ["Co-op"]="Co-op"
            ["Multiplayer"]="Multiplayer"
          )

          for KEY in "${!TAGS[@]}"; do
            TAG="${TAGS[$KEY]}"
            echo "Fetching tag: $KEY..."
            curl -s --max-time 20 \
              "https://steamspy.com/api.php?request=tag&tag=${TAG}" \
              -o "data/tags/${KEY}.json" || echo '{}' > "data/tags/${KEY}.json"
            sleep 1
          done

          echo "Done! Files:"
          ls -lh data/ data/tags/

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update Steam data $(date -u +%Y-%m-%d)"
          git push
