name: Fetch Steam Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Steam datasets
        run: |
          mkdir -p data/tags

          echo "Fetching official Steam most played chart..."
          node <<'NODE'
          const fs = require('fs');

          async function getJson(url, opts = {}) {
            const res = await fetch(url, {
              headers: {
                'user-agent': 'Mozilla/5.0 (compatible; NexusPlayBot/1.0)',
                'accept': 'application/json,text/plain,*/*'
              },
              ...opts
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            return await res.json();
          }

          function extractRanks(payload) {
            const ranks = payload?.response?.ranks || payload?.response?.items || payload?.ranks || payload?.items || [];
            return Array.isArray(ranks) ? ranks : [];
          }

          async function getText(url, opts = {}) {
            const res = await fetch(url, {
              headers: {
                'user-agent': 'Mozilla/5.0 (compatible; NexusPlayBot/1.0)',
                'accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
              },
              ...opts
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            return await res.text();
          }

          function parseSteamChartsRows(html) {
            const out = [];
            const rowRe = /<tr[^>]*>[\s\S]*?<a[^>]+href=["']\/app\/(\d+)[^"']*["'][^>]*>([\s\S]*?)<\/a>[\s\S]*?<td[^>]*class=["'][^"']*num[^"']*["'][^>]*>([\d,]+)<\/td>/gi;
            let m;
            while ((m = rowRe.exec(html)) && out.length < 100) {
              const appid = Number(m[1]);
              const name = m[2].replace(/<[^>]+>/g, ' ').replace(/&amp;/g, '&').replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/\s+/g, ' ').trim();
              const ccu = Number(String(m[3] || '').replace(/,/g, ''));
              if (appid > 0 && name && ccu > 0) out.push({ appid, name, ccu, rank: out.length + 1 });
            }
            return out;
          }

          function saveMostPlayed(data, note = '') {
            fs.writeFileSync('data/mostplayed.json', JSON.stringify(data, null, 2));
            console.log(`Saved data/mostplayed.json with ${data.length} items${note ? ' ' + note : ''}`);
          }

          function toNum(...vals) {
            for (const v of vals) {
              const n = Number(v);
              if (Number.isFinite(n) && n > 0) return n;
            }
            return 0;
          }

          function pickGenres(detail) {
            const genres = Array.isArray(detail?.genres) ? detail.genres.map(g => g?.description).filter(Boolean) : [];
            const cats = Array.isArray(detail?.categories) ? detail.categories.map(c => c?.description).filter(Boolean) : [];
            return Array.from(new Set([...genres, ...cats])).slice(0, 8);
          }

          (async () => {
            let chart;
            let ranks = [];
            try {
              chart = await getJson('https://api.steampowered.com/ISteamChartsService/GetMostPlayedGames/v1/?format=json');
              ranks = extractRanks(chart).slice(0, 100)
                .map((row, idx) => ({
                  appid: Number(row.appid || row.app_id || row.id || row.appID),
                  rank: Number(row.rank || row.position || idx + 1),
                  ccu: toNum(
                    row.concurrent_in_game,
                    row.current_players,
                    row.player_count,
                    row.in_game,
                    row.ccu
                  )
                }))
                .filter(r => Number.isFinite(r.appid) && r.appid > 0 && Number.isFinite(r.ccu) && r.ccu > 0);
            } catch (e) {
              console.error('Most played endpoint failed:', e.message);
            }

            if (ranks.length < 20) {
              try {
                console.log('Falling back to steamcharts.com current players page...');
                const html = await getText('https://steamcharts.com/');
                const fallbackRows = parseSteamChartsRows(html);
                if (fallbackRows.length) ranks = fallbackRows;
                console.log(`Fallback rows: ${fallbackRows.length}`);
              } catch (e) {
                console.error('SteamCharts fallback failed:', e.message);
              }
            }

            if (!ranks.length) {
              console.error('No usable most played rows found. Preserving existing file if present.');
              if (!fs.existsSync('data/mostplayed.json') || fs.statSync('data/mostplayed.json').size < 10) {
                fs.writeFileSync('data/mostplayed.json', '[]');
              }
              process.exit(0);
            }

            async function getAppDetails(appid) {
              try {
                const detailPayload = await getJson(`https://store.steampowered.com/api/appdetails?appids=${appid}&l=english&cc=us`);
                const raw = detailPayload?.[String(appid)];
                return raw?.success ? raw.data : null;
              } catch (e) {
                console.error(`Appdetails failed for ${appid}:`, e.message);
                return null;
              }
            }

            const merged = [];
            for (const item of ranks) {
              const detail = await getAppDetails(item.appid);
              if (!detail || detail.type !== 'game') continue;
              const tags = pickGenres(detail);
              merged.push({
                appid: item.appid,
                name: detail.name || `App ${item.appid}`,
                developer: Array.isArray(detail.developers) ? detail.developers.join(', ') : '',
                ccu: item.ccu,
                positive: 0,
                negative: 0,
                average_2weeks: 0,
                rank: item.rank,
                tags: Object.fromEntries(tags.map(t => [t, 1])),
                tags_list: tags,
                genre: tags.join(', '),
                _source: 'steam_charts'
              });
              await new Promise(resolve => setTimeout(resolve, 80));
            }

            if (!merged.length) {
              console.error('Merged mostplayed list is empty after appdetails lookup. Preserving existing file if present.');
              if (!fs.existsSync('data/mostplayed.json') || fs.statSync('data/mostplayed.json').size < 10) {
                fs.writeFileSync('data/mostplayed.json', '[]');
              }
              process.exit(0);
            }
            saveMostPlayed(merged, 'from Steam current players chart');
          })().catch(err => {
            console.error(err);
            if (!fs.existsSync('data/mostplayed.json') || fs.statSync('data/mostplayed.json').size < 10) {
              fs.writeFileSync('data/mostplayed.json', '[]');
            }
            process.exit(0);
          });
          NODE

          echo "Fetching top 100 games (2 weeks)..."
          curl -s --max-time 30 \
            "https://steamspy.com/api.php?request=top100in2weeks" \
            -o data/hot.json || echo '{}' > data/hot.json

          echo "Fetching top 100 games (forever)..."
          curl -s --max-time 30 \
            "https://steamspy.com/api.php?request=top100forever" \
            -o data/top100.json || echo '{}' > data/top100.json

          echo "Fetching top 100 owned games..."
          curl -s --max-time 30 \
            "https://steamspy.com/api.php?request=top100owned" \
            -o data/top100owned.json || echo '{}' > data/top100owned.json

          declare -A TAGS=(
            ["FPS"]="FPS"
            ["RPG"]="RPG"
            ["Action"]="Action"
            ["Adventure"]="Adventure"
            ["Strategy"]="Strategy"
            ["Simulation"]="Simulation"
            ["Horror"]="Horror"
            ["Survival"]="Survival"
            ["Fighting"]="Fighting"
            ["Sports"]="Sports"
            ["Open_World"]="Open+World"
            ["Indie"]="Indie"
            ["Racing"]="Racing"
            ["Roguelike"]="Roguelike"
            ["Co-op"]="Co-op"
            ["Multiplayer"]="Multiplayer"
          )

          for KEY in "${!TAGS[@]}"; do
            TAG="${TAGS[$KEY]}"
            echo "Fetching tag: $KEY..."
            curl -s --max-time 20 \
              "https://steamspy.com/api.php?request=tag&tag=${TAG}" \
              -o "data/tags/${KEY}.json" || echo '{}' > "data/tags/${KEY}.json"
            sleep 1
          done

          echo "Done! Files:"
          ls -lh data/ data/tags/

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update Steam data $(date -u +%Y-%m-%d)"
          git push
